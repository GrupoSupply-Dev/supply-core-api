services:
  postgres:
    image: postgres:16-alpine
    container_name: supply-core-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: supply_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # Host 5433 avoids clashing with a local PostgreSQL service on Windows (common cause of P1000).
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
